<head>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<link rel="stylesheet" href="style.css">

<style>

body{
	background: linear-gradient(to bottom,#050816,#0b1026);
	color:white;
	min-height:100vh;
}

/* 星空背景（さっきと統一） */
.stars {
	position: fixed;
	width: 100%;
	height: 100%;
	z-index: -1;
	background: transparent;
}

.stars::before,
.stars::after {
	content: "";
	position: absolute;
	width: 200%;
	height: 200%;
	background-image: radial-gradient(white 1px, transparent 1px);
	background-size: 50px 50px;
	animation: moveStars 120s linear infinite;
	opacity: 0.25;
}

.stars::after {
	animation-duration: 200s;
	opacity: 0.12;
}

@keyframes moveStars {
	from { transform: translateY(0); }
	to { transform: translateY(-1000px); }
}

/* タイトル */
.page-title{
	text-align:center;
	font-size:3rem;
	font-weight:bold;
	margin:80px 0 40px;
	text-shadow:
	0 0 10px #8ec5ff,
	0 0 20px #8ec5ff,
	0 0 40px #8ec5ff;
}

/* ガラスカード */
.info-card{
	max-width:700px;
	margin:0 auto;
	background: rgba(255,255,255,0.06);
	border: 1px solid rgba(255,255,255,0.12);
	backdrop-filter: blur(18px);
	border-radius: 30px;
	padding: 40px;
	box-shadow: 0 0 25px rgba(142,197,255,0.15);
	transition: 0.3s;
}

.info-card:hover{
	transform: translateY(-3px);
	box-shadow: 0 0 45px rgba(142,197,255,0.25);
}

/* 行レイアウト */
.info-row{
	display:flex;
	justify-content:space-between;
	margin:18px 0;
	font-size:1.2rem;
}

.label{
	color:#cfd8ff;
}

.value{
	color:#8ec5ff;
	font-weight:bold;
}

</style>

</head>

<body>

<h1 class="page-title">Special Events</h1>

<div class="info-card">

	<div class="info-row">
		<span class="label">Perseid Meteor Shower</span>

	</div>

	<div class="info-row">
