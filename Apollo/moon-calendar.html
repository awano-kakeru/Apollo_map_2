<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<title>Moon Calendar</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<link rel="stylesheet" href="style.css">

<style>

body{
	background: linear-gradient(to bottom,#050816,#0b1026);
	color:white;
	min-height:100vh;
}

/* 星空背景（さっきと統一） */
.stars {
	position: fixed;
	width: 100%;
	height: 100%;
	z-index: -1;
	background: transparent;
}

.stars::before,
.stars::after {
	content: "";
	position: absolute;
	width: 200%;
	height: 200%;
	background-image: radial-gradient(white 1px, transparent 1px);
	background-size: 50px 50px;
	animation: moveStars 120s linear infinite;
	opacity: 0.25;
}

.stars::after {
	animation-duration: 200s;
	opacity: 0.12;
}

@keyframes moveStars {
	from { transform: translateY(0); }
	to { transform: translateY(-1000px); }
}

/* タイトル */
.page-title{
	text-align:center;
	font-size:3rem;
	font-weight:bold;
	margin:80px 0 40px;
	text-shadow:
	0 0 10px #8ec5ff,
	0 0 20px #8ec5ff,
	0 0 40px #8ec5ff;
}

/* ガラスカード */
.info-card{
	max-width:700px;
	margin:0 auto;
	background: rgba(255,255,255,0.06);
	border: 1px solid rgba(255,255,255,0.12);
	backdrop-filter: blur(18px);
	border-radius: 30px;
	padding: 40px;
	box-shadow: 0 0 25px rgba(142,197,255,0.15);
	transition: 0.3s;
}

.info-card:hover{
	transform: translateY(-3px);
	box-shadow: 0 0 45px rgba(142,197,255,0.25);
}

/* 行レイアウト */
.info-row{
	display:flex;
	justify-content:space-between;
	margin:18px 0;
	font-size:1.2rem;
}

.label{
	color:#cfd8ff;
}

.value{
	color:#8ec5ff;
	font-weight:bold;
}

</style>

</head>

<body>


<nav class="navbar navbar-expand-lg navbar-dark bg-dark">
  <div class="container">
    <a class="navbar-brand" href="index.html">Home</a>

    <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav" aria-controls="navbarNav" aria-expanded="false" aria-label="Toggle navigation">
      <span class="navbar-toggler-icon"></span>
    </button>

    <div class="collapse navbar-collapse" id="navbarNav">
      <div class="navbar-nav mx-auto">
        <a class="nav-link" href="tonight-sky.html">Tonight Sky</a>
        <a class="nav-link" href="moon-calendar.html">Moon Calendar</a>
        <a class="nav-link" href="eclipse.html">Eclipse</a>
        <a class="nav-link" href="events.html">Special Events</a>
      </div>
    </div>
  </div>
</nav>


<!-- メイン -->
<h1 class="page-title">Moon Calendar</h1>

<div class="info-card">

	<div class="info-row">
		<span class="label">Next Full Moon</span>
		<span class="value">June 11</span>
	</div>

	<div class="info-row">
		<span class="label">Next New Moon</span>
		<span class="value">May 27</span>
	</div>

	<div class="info-row">
		<span class="label">Moonrise</span>
		<span class="value">18:42</span>
	</div>

</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
